services:
    ai-service:
        build: .
        container_name: ai_service
        env_file:
            - .env
        ports:
            - "8000:8000"
        volumes:
            - .:/app
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        depends_on:
            mongo:
                condition: service_healthy

    mongo:
        image: mongo:7
        container_name: irctc_mongo
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    mongo_data:
